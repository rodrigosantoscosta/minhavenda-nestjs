# docker-compose.yml — MinhaVenda NestJS
#
# Usage:
#   docker compose up -d                              # start everything (infra + app)
#   docker compose up -d --build                      # rebuild app image and start
#   docker compose up -d postgres rabbitmq mailhog    # infra only

services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: minhavenda-nestjs-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-minhavenda}
      POSTGRES_USER: ${DB_USERNAME:-minhavenda}
      POSTGRES_PASSWORD: ${DB_PASSWORD}         # Required — set in .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-minhavenda}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: minhavenda-nestjs-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: minhavenda
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-minhavenda}
    ports:
      - "5672:5672"
      - "15672:15672"     # Management UI: http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: minhavenda-nestjs-mailhog
    ports:
      - "1025:1025"       # SMTP
      - "8025:8025"       # Web UI: http://localhost:8025
    networks:
      - backend
    restart: unless-stopped

  # ─── Application ─────────────────────────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: minhavenda-nestjs:latest
    container_name: minhavenda-nestjs-app
    env_file:
      - .env
    environment:
      # Override host-based defaults so the app reaches sibling containers
      DB_HOST: postgres
      DB_PORT: 5432
      RABBITMQ_URL: amqp://minhavenda:${RABBITMQ_PASS:-minhavenda}@rabbitmq:5672
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  backend:
    driver: bridge
